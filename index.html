<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrooveGlass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --apple-bg: #f2f2f7;
            --vinyl-black: #121212;
        }

        body {
            background-color: var(--apple-bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            color: #1d1d1f;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Vinyl Record Styling */
        .record-outer {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, #2c2c2c 0%, #000 100%);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Real Vinyl Grooves */
        .record-outer::before {
            content: "";
            position: absolute;
            inset: 5px;
            border-radius: 50%;
            background: repeating-radial-gradient(circle, transparent 0, transparent 2px, rgba(255,255,255,0.03) 3px);
            pointer-events: none;
        }

        .album-art {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #000;
            object-fit: cover;
            z-index: 10;
        }

        /* Animation */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .playing {
            animation: rotate 15s linear infinite;
        }

        /* Apple Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 24px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-top: 40px;
            text-align: center;
            min-width: 300px;
        }

        .btn-spotify {
            background-color: #1DB954;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-spotify:hover {
            transform: scale(1.05);
            background-color: #1ed760;
        }
    </style>
</head>
<body>

    <div id="auth-section">
        <button onclick="login()" class="btn-spotify">Connect Spotify</button>
    </div>

    <div id="player-section" class="hidden flex flex-col items-center">
        <div id="vinyl-container" class="record-outer">
            <img id="track-art" src="" class="album-art">
            <div class="absolute w-3 h-3 bg-[#f2f2f7] rounded-full z-20 shadow-inner"></div>
        </div>

        <div class="glass-card">
            <h1 id="track-title" class="text-xl font-bold tracking-tight">No Song Playing</h1>
            <p id="track-artist" class="text-gray-500 font-medium mt-1">Ready when you are</p>
        </div>
    </div>

    <script>
        const CLIENT_ID = '4333e8f4c8224103b6ac0089cba6d880'; 
        const REDIRECT_URI = 'https://eddietlou.github.io/GrooveGlass/';
        const SCOPES = 'user-read-currently-playing';

        function login() {
            const authUrl = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES)}`;
            window.location.href = authUrl;
        }

        function getHashParams() {
            const hash = window.location.hash.substring(1);
            return hash.split('&').reduce((acc, item) => {
                const [key, value] = item.split('=');
                acc[key] = decodeURIComponent(value);
                return acc;
            }, {});
        }

        const params = getHashParams();
        const accessToken = params.access_token;

        if (accessToken) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('player-section').classList.remove('hidden');
            
            // Clean URL by removing the token
            window.history.pushState("", document.title, window.location.pathname);

            async function fetchCurrentTrack() {
                try {
                    const response = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });

                    if (response.status === 204 || response.status > 400) {
                        console.log("Nothing playing...");
                        return;
                    }

                    const data = await response.json();
                    
                    // Update UI
                    document.getElementById('track-title').innerText = data.item.name;
                    document.getElementById('track-artist').innerText = data.item.artists[0].name;
                    document.getElementById('track-art').src = data.item.album.images[0].url;

                    const vinyl = document.getElementById('vinyl-container');
                    if (data.is_playing) {
                        vinyl.classList.add('playing');
                    } else {
                        vinyl.classList.remove('playing');
                    }
                } catch (err) {
                    console.error("API Error:", err);
                }
            }

            // Update every 3 seconds
            setInterval(fetchCurrentTrack, 3000);
            fetchCurrentTrack();
        }
    </script>
</body>
</html>
