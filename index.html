<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrooveGlass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <style>
        :root { --main-color: #121212; }
        body { 
            background: var(--main-color); transition: background 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden;
        }

        /* LIQUID APPLE GLASS DESIGN */
        .glass-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 60px; padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            text-align: center; color: white;
        }

        /* TRANSPARENT VINYL PLAYER */
        .vinyl-wrapper {
            position: relative; width: 340px; height: 340px; margin-bottom: 30px;
            filter: drop-shadow(0 30px 40px rgba(0,0,0,0.5));
        }
        .vinyl-record {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, rgba(40,40,40,0.8) 0%, rgba(0,0,0,0.9) 100%);
            display: flex; align-items: center; justify-content: center;
            position: relative; border: 1px solid rgba(255,255,255,0.1);
        }
        /* The Grooves */
        .vinyl-record::after {
            content: ""; position: absolute; inset: 5px; border-radius: 50%;
            background: repeating-radial-gradient(circle, transparent 0, transparent 1px, rgba(255,255,255,0.04) 2px);
        }
        .album-art {
            width: 135px; height: 135px; border-radius: 50%;
            z-index: 10; object-fit: cover; border: 4px solid #000;
        }
        .center-pin {
            position: absolute; width: 14px; height: 14px; background: white;
            border-radius: 50%; z-index: 20; box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: spin 12s linear infinite; }

        .spotify-logo { width: 50px; margin: 0 auto 20px; filter: drop-shadow(0 0 10px #1DB954); }
    </style>
</head>
<body>

    <div id="login-view">
        <div class="glass-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" class="spotify-logo">
            <h1 class="text-4xl font-black mb-10 tracking-tight">GrooveGlass</h1>
            <button onclick="login()" class="bg-[#1DB954] text-white px-10 py-4 rounded-full font-bold text-lg hover:scale-105 transition-transform shadow-lg">Connect Spotify</button>
        </div>
    </div>

    <div id="player-view" class="hidden flex flex-col items-center">
        <div class="vinyl-wrapper">
            <div id="record" class="vinyl-record">
                <img id="track-img" src="" crossorigin="anonymous" class="album-art">
                <div class="center-pin"></div>
            </div>
        </div>
        <div class="glass-container min-w-[320px]">
            <h2 id="track-name" class="text-2xl font-bold truncate px-4">Nothing Playing</h2>
            <p id="artist-name" class="text-sm font-semibold opacity-60 tracking-widest uppercase mt-1"></p>
        </div>
    </div>

    <script>
        const CLIENT_ID = '4333e8f4c8224103b6ac0089cba6d880';
        const REDIRECT_URI = 'https://eddietlou.github.io/GrooveGlass/';
        const thief = new ColorThief();

        async function login() {
            const verifier = [...crypto.getRandomValues(new Uint8Array(32))].map(b => b.toString(16).padStart(2, '0')).join('');
            localStorage.setItem('verifier', verifier);
            const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
            const challenge = btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');

            const params = new URLSearchParams({
                response_type: 'code',
                client_id: CLIENT_ID,
                scope: 'user-read-currently-playing',
                redirect_uri: REDIRECT_URI,
                code_challenge_method: 'S256',
                code_challenge: challenge
            });
            window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
        }

        const code = new URLSearchParams(window.location.search).get('code');
        if (code) {
            (async () => {
                const res = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: CLIENT_ID, grant_type: 'authorization_code',
                        code: code, redirect_uri: REDIRECT_URI,
                        code_verifier: localStorage.getItem('verifier')
                    })
                });
                const data = await res.json();
                if (data.access_token) {
                    localStorage.setItem('token', data.access_token);
                    window.history.pushState({}, null, REDIRECT_URI);
                    start(data.access_token);
                }
            })();
        }

        function start(token) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('player-view').classList.remove('hidden');

            async function update() {
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.status === 200) {
                        const song = await res.json();
                        document.getElementById('track-name').innerText = song.item.name;
                        document.getElementById('artist-name').innerText = song.item.artists[0].name;
                        
                        const img = document.getElementById('track-img');
                        if (img.src !== song.item.album.images[0].url) {
                            img.src = song.item.album.images[0].url;
                            img.onload = () => {
                                const color = thief.getColor(img);
                                document.documentElement.style.setProperty('--main-color', `rgb(${color[0]}, ${color[1]}, ${color[2]})`);
                            };
                        }
                        document.getElementById('record').classList.toggle('spinning', song.is_playing);
                    }
                } catch(e) {}
            }
            setInterval(update, 3000); update();
        }

        const savedToken = localStorage.getItem('token');
        if (savedToken && !code) start(savedToken);
    </script>
</body>
</html>
