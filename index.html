<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrooveGlass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <style>
        :root { --accent: #1DB954; --bg: #f2f2f7; }
        body { 
            background: var(--bg); 
            transition: background 1.5s ease;
            font-family: -apple-system, sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        /* The Liquid Glass Look */
        .glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        /* REAL VINYL DESIGN */
        .vinyl-container {
            position: relative;
            width: 340px; height: 340px;
            perspective: 1000px;
        }

        .record {
            width: 100%; height: 100%;
            background: radial-gradient(circle, #222 0%, #050505 100%);
            border-radius: 50%;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* The grooves on the vinyl */
        .record::after {
            content: ""; position: absolute; inset: 2px; border-radius: 50%;
            background: repeating-radial-gradient(circle, transparent 0, transparent 1px, rgba(255,255,255,0.02) 2px);
        }

        .album-art {
            width: 130px; height: 130px;
            border-radius: 50%;
            border: 5px solid #111;
            z-index: 10;
            object-fit: cover;
        }

        .center-hole {
            position: absolute; width: 12px; height: 12px;
            background: var(--bg); border-radius: 50%; z-index: 20;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .is-playing { animation: spin 20s linear infinite; }

        /* Apple Control Button */
        .glass-button {
            background: rgba(255, 255, 255, 0.2);
            padding: 16px 32px;
            border-radius: 25px;
            color: #1d1d1f;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s;
            cursor: pointer;
        }
        .glass-button:hover { background: rgba(255, 255, 255, 0.4); transform: translateY(-2px); }
    </style>
</head>
<body>

    <div id="auth-section" class="flex flex-col items-center">
        <div class="glass p-12 flex flex-col items-center">
            <h1 class="text-4xl font-black mb-8">GrooveGlass</h1>
            <button id="login-btn" class="glass-button flex items-center gap-3">
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" width="24">
                Connect Spotify
            </button>
        </div>
    </div>

    <div id="player-section" class="hidden flex flex-col items-center">
        <div class="vinyl-container mb-12">
            <div id="record" class="record">
                <img id="track-art" src="" crossorigin="anonymous" class="album-art">
                <div class="center-hole"></div>
            </div>
        </div>

        <div class="glass p-8 min-w-[320px] text-center">
            <h2 id="track-title" class="text-2xl font-bold truncate">Nothing Playing</h2>
            <p id="track-artist" class="text-gray-600 font-medium opacity-80 uppercase tracking-tighter text-xs mt-1"></p>
        </div>
    </div>

    <script>
        const clientId = '4333e8f4c8224103b6ac0089cba6d880';
        const redirectUri = 'https://eddietlou.github.io/GrooveGlass/';
        const colorThief = new ColorThief();

        // 1. AUTH LOGIC
        document.getElementById('login-btn').addEventListener('click', () => {
            const verifier = Math.random().toString(36).substring(2, 15);
            localStorage.setItem('verifier', verifier);
            const params = new URLSearchParams({
                response_type: 'token', // Using token for simplicity on static pages
                client_id: clientId,
                scope: 'user-read-currently-playing',
                redirect_uri: redirectUri
            });
            window.location.href = `https://accounts.spotify.com/authorize?client_id=${params.toString()}`;
        });

        const hash = new URLSearchParams(window.location.hash.substring(1));
        const token = hash.get('access_token');

        if (token) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('player-section').classList.remove('hidden');
            window.history.pushState("", "", redirectUri);

            async function update() {
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.status === 200) {
                        const data = await res.json();
                        document.getElementById('track-title').innerText = data.item.name;
                        document.getElementById('track-artist').innerText = data.item.artists[0].name;
                        
                        const art = document.getElementById('track-art');
                        if (art.src !== data.item.album.images[0].url) {
                            art.src = data.item.album.images[0].url;
                            art.onload = () => {
                                const rgb = colorThief.getColor(art);
                                document.body.style.background = `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;
                            };
                        }

                        document.getElementById('record').className = data.is_playing ? 'record is-playing' : 'record';
                    }
                } catch (e) {}
            }
            setInterval(update, 3000);
            update();
        }
    </script>
</body>
</html>
