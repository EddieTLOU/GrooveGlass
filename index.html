<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrooveGlass | Now Playing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <style>
        :root { --dynamic-bg: #f2f2f7; }
        body { 
            background: var(--dynamic-bg); 
            transition: background 2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow: hidden;
        }

        /* Apple Liquid Glass Styling */
        .glass-panel {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* The MD Vinyl Record */
        .vinyl-wrapper {
            position: relative; width: 340px; height: 340px;
            filter: drop-shadow(0 30px 50px rgba(0,0,0,0.4));
        }
        .record {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, #222 0%, #050505 100%);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .record::after {
            content: ""; position: absolute; inset: 4px; border-radius: 50%;
            background: repeating-radial-gradient(circle, transparent 0, transparent 1.5px, rgba(255,255,255,0.04) 2px);
        }
        .album-art {
            width: 130px; height: 130px; border-radius: 50%;
            border: 4px solid #111; z-index: 10; object-fit: cover;
            transition: transform 0.5s ease;
        }
        .hole {
            position: absolute; width: 14px; height: 14px; background: var(--dynamic-bg);
            border-radius: 50%; z-index: 20; box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: spin 15s linear infinite; }

        /* Liquid Apple Button */
        .apple-btn {
            background: white; color: black;
            padding: 18px 36px; border-radius: 30px;
            font-weight: 700; font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
        }
        .apple-btn:hover { transform: scale(1.05) translateY(-2px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        .apple-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="setup-screen" class="flex flex-col items-center">
        <div class="glass-panel p-16 flex flex-col items-center text-center">
            <div class="w-24 h-24 bg-black rounded-[2rem] flex items-center justify-center mb-10 shadow-2xl">
                <svg width="50" height="50" viewBox="0 0 24 24" fill="#1DB954"><path d="M12 0C5.372 0 0 5.372 0 12s5.372 12 12 12 12-5.372 12-12S18.628 0 12 0zm5.508 17.302c-.216.354-.674.464-1.028.248-2.858-1.746-6.456-2.14-10.696-1.172-.406.094-.816-.16-.91-.564-.094-.406.16-.816.564-.91 4.63-1.06 8.624-.608 11.822 1.344.354.218.464.676.248 1.028zm1.474-3.26c-.272.44-.848.58-1.288.308-3.27-2.01-8.254-2.592-12.12-1.418-.496.15-1.022-.132-1.172-.628s.132-1.022.628-1.172c4.406-1.336 9.904-.686 13.644 1.61.44.272.58.848.308 1.288zm.126-3.414c-3.922-2.328-10.386-2.542-14.13-1.404-.602.184-1.238-.162-1.422-.764s.162-1.238.764-1.422c4.298-1.306 11.436-1.042 15.968 1.648.542.322.72.1.4.1.72-.542-.322-.72-.1-1.04-.4z"/></svg>
            </div>
            <h1 class="text-5xl font-black mb-4 tracking-tight">GrooveGlass</h1>
            <p class="text-gray-500 mb-10 font-medium text-lg">Experience your music in high fidelity.</p>
            <button id="auth-trigger" class="apple-btn">Connect Spotify</button>
        </div>
    </div>

    <div id="player-screen" class="hidden flex flex-col items-center">
        <div class="vinyl-wrapper mb-14">
            <div id="record-body" class="record">
                <img id="album-img" src="" crossorigin="anonymous" class="album-art">
                <div class="hole"></div>
            </div>
        </div>
        <div class="glass-panel py-8 px-12 text-center min-w-[340px]">
            <h2 id="song-title" class="text-2xl font-bold text-gray-900 truncate max-w-[280px]">Loading...</h2>
            <p id="song-artist" class="text-gray-600 font-semibold tracking-wide uppercase text-[10px] mt-2 opacity-60"></p>
        </div>
    </div>

    <script>
        const CLIENT_ID = '4333e8f4c8224103b6ac0089cba6d880';
        const REDIRECT_URI = 'https://eddietlou.github.io/GrooveGlass/';
        const colorThief = new ColorThief();

        // PKCE Flow Logic
        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        };

        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        };

        const base64encode = (input) => {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
        };

        document.getElementById('auth-trigger').addEventListener('click', async () => {
            const codeVerifier = generateRandomString(64);
            const hashed = await sha256(codeVerifier);
            const codeChallenge = base64encode(hashed);
            window.localStorage.setItem('code_verifier', codeVerifier);

            const params = new URLSearchParams({
                response_type: 'code',
                client_id: CLIENT_ID,
                scope: 'user-read-currently-playing',
                code_challenge_method: 'S256',
                code_challenge: codeChallenge,
                redirect_uri: REDIRECT_URI,
            });
            window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
        });

        // Handle Callback
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
            (async () => {
                const codeVerifier = window.localStorage.getItem('code_verifier');
                const response = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: CLIENT_ID,
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: REDIRECT_URI,
                        code_verifier: codeVerifier,
                    }),
                });
                const data = await response.json();
                if (data.access_token) {
                    window.localStorage.setItem('token', data.access_token);
                    window.history.pushState({}, null, REDIRECT_URI);
                    initPlayer(data.access_token);
                }
            })();
        }

        function initPlayer(token) {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('player-screen').classList.remove('hidden');

            async function poll() {
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.status === 200) {
                        const song = await res.json();
                        document.getElementById('song-title').innerText = song.item.name;
                        document.getElementById('song-artist').innerText = song.item.artists[0].name;
                        
                        const img = document.getElementById('album-img');
                        if (img.src !== song.item.album.images[0].url) {
                            img.src = song.item.album.images[0].url;
                            img.onload = () => {
                                try {
                                    const color = colorThief.getColor(img);
                                    document.documentElement.style.setProperty('--dynamic-bg', `rgb(${color[0]}, ${color[1]}, ${color[2]})`);
                                } catch(e) {}
                            };
                        }
                        document.getElementById('record-body').classList.toggle('spinning', song.is_playing);
                    }
                } catch (e) {}
            }
            setInterval(poll, 3000);
            poll();
        }

        const savedToken = window.localStorage.getItem('token');
        if (savedToken && !code) initPlayer(savedToken);
    </script>
</body>
</html>
