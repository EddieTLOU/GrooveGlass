<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrooveGlass | MD Vinyl</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <style>
        :root { --bg-main: #1a1a1a; }
        body { 
            background: var(--bg-main); transition: background 2s ease;
            height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, sans-serif; overflow: hidden;
        }

        /* BLUR MESH BACKGROUND */
        .mesh-gradient {
            position: fixed; inset: 0; z-index: -1;
            filter: blur(100px); opacity: 0.6;
        }

        /* MD VINYL SLEEVE & RECORD */
        .player-container {
            position: relative; width: 340px; height: 340px;
            display: flex; align-items: center; justify-content: center;
        }

        /* The Square Album Cover (The Sleeve) */
        .sleeve {
            width: 300px; height: 300px; background: #222;
            z-index: 10; border-radius: 8px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: absolute; left: 0;
        }
        .sleeve img { width: 100%; height: 100%; object-fit: cover; }

        /* The Spinning Record (Sliding out) */
        .vinyl {
            width: 290px; height: 290px; border-radius: 50%;
            background: radial-gradient(circle, #222 0%, #000 100%);
            position: absolute; right: -60px; /* Slides out like MD Vinyl */
            z-index: 5; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .vinyl::after {
            content: ""; position: absolute; inset: 5px; border-radius: 50%;
            background: repeating-radial-gradient(circle, transparent 0, transparent 1px, rgba(255,255,255,0.03) 2px);
        }
        .vinyl-art {
            width: 110px; height: 110px; border-radius: 50%;
            border: 3px solid #000; object-fit: cover;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: rotate 15s linear infinite; }

        /* TEXT PANEL */
        .info-card {
            position: absolute; bottom: -120px; width: 100%;
            background: rgba(255,255,255,0.1); backdrop-filter: blur(30px);
            border-radius: 30px; padding: 20px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; color: white;
        }

        .spotify-btn {
            background: #1DB954; color: white; padding: 15px 30px;
            border-radius: 50px; font-weight: bold; display: flex; align-items: center; gap: 10px;
        }
    </style>
</head>
<body>

    <div id="auth-view" class="flex flex-col items-center">
        <div class="bg-white/10 backdrop-blur-xl p-12 rounded-[50px] border border-white/20 flex flex-col items-center">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="#1DB954" class="mb-6"><path d="M12 0C5.372 0 0 5.372 0 12s5.372 12 12 12 12-5.372 12-12S18.628 0 12 0zm5.508 17.302c-.216.354-.674.464-1.028.248-2.858-1.746-6.456-2.14-10.696-1.172-.406.094-.816-.16-.91-.564-.094-.406.16-.816.564-.91 4.63-1.06 8.624-.608 11.822 1.344.354.218.464.676.248 1.028zm1.474-3.26c-.272.44-.848.58-1.288.308-3.27-2.01-8.254-2.592-12.12-1.418-.496.15-1.022-.132-1.172-.628s.132-1.022.628-1.172c4.406-1.336 9.904-.686 13.644 1.61.44.272.58.848.308 1.288zm.126-3.414c-3.922-2.328-10.386-2.542-14.13-1.404-.602.184-1.238-.162-1.422-.764s.162-1.238.764-1.422c4.298-1.306 11.436-1.042 15.968 1.648.542.322.72.64.4.1.72-.542-.322-.72-.1-1.04-.4z"/></svg>
            <h1 class="text-white text-3xl font-black mb-8">GrooveGlass</h1>
            <button onclick="login()" class="spotify-btn">Connect Spotify</button>
        </div>
    </div>

    <div id="player-view" class="hidden">
        <div class="player-container">
            <div class="vinyl" id="vinyl-disk">
                <img id="vinyl-art" src="" crossorigin="anonymous" class="vinyl-art">
            </div>
            <div class="sleeve">
                <img id="sleeve-art" src="" crossorigin="anonymous">
            </div>
            <div class="info-card">
                <h2 id="song-name" class="text-xl font-bold truncate">Loading...</h2>
                <p id="artist-name" class="text-sm opacity-60 uppercase tracking-widest mt-1"></p>
            </div>
        </div>
    </div>

    <script>
        const CLIENT_ID = '4333e8f4c8224103b6ac0089cba6d880';
        const REDIRECT_URI = 'https://eddietlou.github.io/GrooveGlass/';
        const thief = new ColorThief();

        async function login() {
            const verifier = Math.random().toString(36).substring(2, 15);
            localStorage.setItem('v', verifier);
            const params = new URLSearchParams({
                response_type: 'code', client_id: CLIENT_ID, scope: 'user-read-currently-playing',
                redirect_uri: REDIRECT_URI, code_challenge_method: 'plain', code_challenge: verifier
            });
            window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
        }

        const code = new URLSearchParams(window.location.search).get('code');
        if (code) {
            (async () => {
                const res = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: CLIENT_ID, grant_type: 'authorization_code',
                        code: code, redirect_uri: REDIRECT_URI, code_verifier: localStorage.getItem('v')
                    })
                });
                const data = await res.json();
                if (data.access_token) {
                    localStorage.setItem('t', data.access_token);
                    window.history.pushState({}, null, REDIRECT_URI);
                    start(data.access_token);
                }
            })();
        }

        function start(token) {
            document.getElementById('auth-view').style.display = 'none';
            document.getElementById('player-view').classList.remove('hidden');

            async function update() {
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.status === 200) {
                        const s = await res.json();
                        document.getElementById('song-name').innerText = s.item.name;
                        document.getElementById('artist-name').innerText = s.item.artists[0].name;
                        
                        const artUrl = s.item.album.images[0].url;
                        const sleeve = document.getElementById('sleeve-art');
                        const vinylArt = document.getElementById('vinyl-art');

                        if (sleeve.src !== artUrl) {
                            sleeve.src = artUrl;
                            vinylArt.src = artUrl;
                            sleeve.onload = () => {
                                const c = thief.getColor(sleeve);
                                document.body.style.background = `rgb(${c[0]}, ${c[1]}, ${c[2]})`;
                            };
                        }
                        document.getElementById('vinyl-disk').classList.toggle('spinning', s.is_playing);
                    }
                } catch(e) {}
            }
            setInterval(update, 3000); update();
        }

        const saved = localStorage.getItem('t');
        if (saved && !code) start(saved);
    </script>
</body>
</html>
