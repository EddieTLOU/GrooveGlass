<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrooveGlass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <style>
        :root { --accent: #1DB954; --bg: #000000; }
        body { 
            background: var(--bg); transition: background 2s ease;
            font-family: -apple-system, sans-serif; height: 100vh;
            display: flex; align-items: center; justify-content: center; margin: 0;
        }

        /* LIQUID GLASS CARD */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px; padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center; color: white;
        }

        /* MD VINYL RECORD */
        .record-container {
            position: relative; width: 320px; height: 320px;
            margin-bottom: 40px; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8));
        }
        .vinyl {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, #222 0%, #000 100%);
            display: flex; align-items: center; justify-content: center;
            position: relative; border: 1px solid #111;
        }
        .vinyl::after {
            content: ""; position: absolute; inset: 5px; border-radius: 50%;
            background: repeating-radial-gradient(circle, transparent 0, transparent 1px, rgba(255,255,255,0.03) 2px);
        }
        .album-art {
            width: 130px; height: 130px; border-radius: 50%;
            z-index: 10; object-fit: cover; border: 4px solid #0a0a0a;
        }
        .center-dot {
            position: absolute; width: 12px; height: 12px; background: white;
            border-radius: 50%; z-index: 20; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .is-playing { animation: spin 15s linear infinite; }

        /* SPOTIFY BUTTON */
        .spotify-btn {
            background: #1DB954; color: white; padding: 16px 32px;
            border-radius: 50px; font-weight: 700; font-size: 1.1rem;
            display: inline-flex; align-items: center; gap: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .spotify-btn:hover { transform: scale(1.05); background: #1ed760; }
    </style>
</head>
<body>

    <div id="login-view" class="flex flex-col items-center">
        <div class="glass-card">
            <div class="mb-8 flex justify-center">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="#1DB954">
                    <path d="M12 0C5.372 0 0 5.372 0 12s5.372 12 12 12 12-5.372 12-12S18.628 0 12 0zm5.508 17.302c-.216.354-.674.464-1.028.248-2.858-1.746-6.456-2.14-10.696-1.172-.406.094-.816-.16-.91-.564-.094-.406.16-.816.564-.91 4.63-1.06 8.624-.608 11.822 1.344.354.218.464.676.248 1.028zm1.474-3.26c-.272.44-.848.58-1.288.308-3.27-2.01-8.254-2.592-12.12-1.418-.496.15-1.022-.132-1.172-.628s.132-1.022.628-1.172c4.406-1.336 9.904-.686 13.644 1.61.44.272.58.848.308 1.288zm.126-3.414c-3.922-2.328-10.386-2.542-14.13-1.404-.602.184-1.238-.162-1.422-.764s.162-1.238.764-1.422c4.298-1.306 11.436-1.042 15.968 1.648.542.322.72.64.4.1.72-.542-.322-.72-.1-1.04-.4z"/>
                </svg>
            </div>
            <h1 class="text-4xl font-black mb-10 tracking-tight">GrooveGlass</h1>
            <button onclick="startAuth()" class="spotify-btn">
                Connect Spotify
            </button>
        </div>
    </div>

    <div id="player-view" class="hidden flex flex-col items-center">
        <div class="record-container">
            <div id="vinyl-disk" class="vinyl">
                <img id="now-playing-art" src="" crossorigin="anonymous" class="album-art">
                <div class="center-dot"></div>
            </div>
        </div>
        <div class="glass-card min-w-[320px]">
            <h2 id="song-name" class="text-2xl font-bold mb-1">Loading...</h2>
            <p id="artist-name" class="text-sm font-semibold opacity-50 tracking-widest uppercase"></p>
        </div>
    </div>

    <script>
        const CLIENT_ID = '4333e8f4c8224103b6ac0089cba6d880';
        const REDIRECT_URI = 'https://eddietlou.github.io/GrooveGlass/';
        const thief = new ColorThief();

        // PKCE REQUIRED FOR 2026
        async function startAuth() {
            const verifier = Math.random().toString(36).substring(2, 15);
            localStorage.setItem('v', verifier);
            const params = new URLSearchParams({
                response_type: 'code', // MUST BE CODE
                client_id: CLIENT_ID,
                scope: 'user-read-currently-playing',
                redirect_uri: REDIRECT_URI,
                code_challenge_method: 'plain',
                code_challenge: verifier
            });
            window.location.href = `https://accounts.spotify.com/authorize?${params.toString()}`;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
            (async () => {
                const res = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: CLIENT_ID,
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: REDIRECT_URI,
                        code_verifier: localStorage.getItem('v')
                    })
                });
                const data = await res.json();
                if (data.access_token) {
                    localStorage.setItem('t', data.access_token);
                    window.history.pushState({}, null, REDIRECT_URI);
                    runPlayer(data.access_token);
                }
            })();
        }

        function runPlayer(token) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('player-view').classList.remove('hidden');

            async function sync() {
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.status === 200) {
                        const s = await res.json();
                        document.getElementById('song-name').innerText = s.item.name;
                        document.getElementById('artist-name').innerText = s.item.artists[0].name;
                        
                        const img = document.getElementById('now-playing-art');
                        if (img.src !== s.item.album.images[0].url) {
                            img.src = s.item.album.images[0].url;
                            img.onload = () => {
                                const c = thief.getColor(img);
                                document.body.style.background = `rgb(${c[0]}, ${c[1]}, ${c[2]})`;
                            };
                        }
                        document.getElementById('vinyl-disk').className = s.is_playing ? 'vinyl is-playing' : 'vinyl';
                    }
                } catch(e) {}
            }
            setInterval(sync, 3000);
            sync();
        }

        const saved = localStorage.getItem('t');
        if (saved && !code) runPlayer(saved);
    </script>
</body>
</html>
