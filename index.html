<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrooveGlass | Pro Vinyl</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <style>
        :root { --bg-color: #121212; }
        body {
            background-color: var(--bg-color);
            transition: background-color 2s ease;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: -apple-system, sans-serif; margin: 0; overflow: hidden;
        }

        /* THE VINYL PLAYER */
        .vinyl-container {
            position: relative; width: 350px; height: 350px;
            filter: drop-shadow(0 40px 70px rgba(0,0,0,0.6));
        }
        .record {
            width: 100%; height: 100%; border-radius: 50%;
            background: radial-gradient(circle, #2a2a2a 0%, #000 100%);
            display: flex; align-items: center; justify-content: center;
            position: relative; border: 2px solid #1a1a1a;
        }
        /* Realistic grooves */
        .record::after {
            content: ""; position: absolute; inset: 4px; border-radius: 50%;
            background: repeating-radial-gradient(circle, transparent 0, transparent 1.5px, rgba(255,255,255,0.03) 2px);
        }
        .album-art {
            width: 140px; height: 140px; border-radius: 50%;
            border: 4px solid #080808; z-index: 10; object-fit: cover;
        }
        .hole {
            position: absolute; width: 12px; height: 12px; background: white;
            border-radius: 50%; z-index: 20; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
        }

        /* Animations */
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: rotate 15s linear infinite; }

        /* Liquid Glass UI */
        .glass-ui {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px; padding: 25px 50px;
            text-align: center; margin-top: 50px; color: white;
        }
        .connect-btn {
            background: white; color: black; padding: 15px 35px;
            border-radius: 30px; font-weight: 800; font-size: 1.1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .connect-btn:hover { transform: scale(1.05); background: #1DB954; color: white; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="glass-ui">
            <h1 class="text-4xl font-black mb-8">GrooveGlass</h1>
            <button onclick="login()" class="connect-btn">Connect Spotify</button>
        </div>
    </div>

    <div id="player-screen" class="hidden flex flex-col items-center">
        <div class="vinyl-container">
            <div id="record-disk" class="record">
                <img id="art-display" src="" crossorigin="anonymous" class="album-art">
                <div class="hole"></div>
            </div>
        </div>

        <div class="glass-ui min-w-[320px]">
            <h2 id="song-name" class="text-2xl font-bold">Waiting for Music</h2>
            <p id="artist-name" class="text-sm opacity-60 font-semibold mt-1 tracking-widest uppercase"></p>
        </div>
    </div>

    <script>
        const CLIENT_ID = '4333e8f4c8224103b6ac0089cba6d880';
        const REDIRECT_URI = 'https://eddietlou.github.io/GrooveGlass/';
        const colorThief = new ColorThief();

        function login() {
            const url = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=user-read-currently-playing`;
            window.location.href = url;
        }

        const params = new URLSearchParams(window.location.hash.substring(1));
        const token = params.get('access_token');

        if (token) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('player-screen').classList.remove('hidden');
            window.history.pushState("", "", REDIRECT_URI);

            async function update() {
                try {
                    const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (res.status === 200) {
                        const song = await res.json();
                        document.getElementById('song-name').innerText = song.item.name;
                        document.getElementById('artist-name').innerText = song.item.artists[0].name;
                        
                        const img = document.getElementById('art-display');
                        if (img.src !== song.item.album.images[0].url) {
                            img.src = song.item.album.images[0].url;
                            img.onload = () => {
                                try {
                                    const color = colorThief.getColor(img);
                                    document.body.style.backgroundColor = `rgb(${color[0]}, ${color[1]}, ${color[2]})`;
                                } catch(e) { console.log("Color grab blocked by CORS"); }
                            };
                        }

                        document.getElementById('record-disk').classList.toggle('spinning', song.is_playing);
                    } else if (res.status === 204) {
                        document.getElementById('song-name').innerText = "Nothing Playing";
                        document.getElementById('artist-name').innerText = "Start a song on your app";
                        document.getElementById('record-disk').classList.remove('spinning');
                    }
                } catch (e) { console.error(e); }
            }
            setInterval(update, 2500);
            update();
        }
    </script>
</body>
</html>
