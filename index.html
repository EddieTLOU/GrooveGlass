<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrooveGlass | Vinyl Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg-color: #f5f5f7; }
        body { background-color: var(--bg-color); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* The Vinyl Rotation */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spinning { animation: spin 20s linear infinite; }
        .paused { animation-play-state: paused; }

        /* Neumorphic Glass Effect */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }

        /* The Vinyl Record Texture */
        .vinyl-record {
            background: #111;
            background-image: radial-gradient(circle, #333 1px, transparent 1px), 
                              repeating-radial-gradient(circle, #222, #111 2px, #222 4px);
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center overflow-hidden">

    <div id="login-screen" class="text-center">
        <h1 class="text-4xl font-bold mb-8 text-gray-800">GrooveGlass</h1>
        <button onclick="authorize()" class="bg-black text-white px-8 py-3 rounded-full font-medium hover:scale-105 transition-transform">
            Connect Spotify
        </button>
    </div>

    <div id="player-screen" class="hidden flex flex-col items-center">
        <!-- Vinyl Record Container -->
        <div id="record-container" class="relative w-80 h-80 mb-12">
            <!-- Shadow -->
            <div class="absolute inset-0 rounded-full bg-black opacity-20 blur-2xl transform translate-y-8"></div>
            
            <!-- The Record -->
            <div id="vinyl" class="vinyl-record w-full h-full rounded-full flex items-center justify-center spinning paused">
                <!-- Album Art -->
                <div class="w-32 h-32 rounded-full overflow-hidden border-4 border-black">
                    <img id="album-art" src="https://via.placeholder.com/300" class="w-full h-full object-cover">
                </div>
                <!-- Center Hole -->
                <div class="absolute w-4 h-4 bg-[#f5f5f7] rounded-full shadow-inner"></div>
            </div>
        </div>

        <!-- Track Info -->
        <div class="glass-card px-12 py-6 rounded-3xl text-center">
            <h2 id="track-name" class="text-2xl font-bold text-gray-900 leading-tight">Not Playing</h2>
            <p id="artist-name" class="text-gray-500 font-medium">Open Spotify to start</p>
        </div>
    </div>

    <script>
        const CLIENT_ID = 'YOUR_CLIENT_ID_HERE'; 
        const REDIRECT_URI = window.location.href.split('?')[0];
        const SCOPES = 'user-read-currently-playing';

        function authorize() {
            const url = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(SCOPES)}`;
            window.location.href = url;
        }

        function getAccessToken() {
            const params = new URLSearchParams(window.location.hash.replace('#', ''));
            return params.get('access_token');
        }

        async function updatePlayer() {
            const token = getAccessToken();
            if (!token) return;

            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('player-screen').classList.remove('hidden');

            try {
                const response = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.status === 200) {
                    const data = await response.json();
                    document.getElementById('track-name').innerText = data.item.name;
                    document.getElementById('artist-name').innerText = data.item.artists[0].name;
                    document.getElementById('album-art').src = data.item.album.images[0].url;
                    
                    if (data.is_playing) {
                        document.getElementById('vinyl').classList.remove('paused');
                    } else {
                        document.getElementById('vinyl').classList.add('paused');
                    }
                }
            } catch (err) {
                console.error("Error fetching Spotify data", err);
            }
        }

        // Check for token on load
        if (getAccessToken()) {
            setInterval(updatePlayer, 2000); // Check every 2 seconds
            updatePlayer();
        }
    </script>
</body>
</html>
